<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact - Hailey DeMark</title>
    <link rel="stylesheet" href="home.css" />
  </head>

    <!-- nav bar -->
  <body class="simple-page">
    <header class="site-header">
      <div class="header-inner">
        <a href="/" class="brand">Hailey DeMark</a>
        <nav class="nav">
          <a href="/portfolio" class="nav-link">Portfolio</a>
          <a href="/about" class="nav-link">About</a>
          <a href="/contact" class="nav-link active">Contact</a>
        </nav>
      </div>
    </header>

    <!-- main logic for the contact form  -->
    <main class="page-content contact-page">
      <section class="contact-card">
        <h1 class="contact-title">Contact Me</h1>
    
        <form class="contact-form" action="/contact" method="POST">
          <div class="contact-group">
            <label class="contact-label">Name</label>
    
            <div class="contact-name-row">
              <div class="contact-field">
                <label for="firstName" class="contact-sub-label">First Name <span>(required)</span></label>
                <input type="text" id="firstName" name="firstName" required />
              </div>
    
              <div class="contact-field">
                <label for="lastName" class="contact-sub-label">Last Name <span>(required)</span></label>
                <input type="text" id="lastName" name="lastName" required />
              </div>
            </div>
          </div>
    
          <div class="contact-group">
            <label for="email" class="contact-label">Email <span>(required)</span></label>
            <input type="email" id="email" name="email" required />
          </div>
    
          <div class="contact-group">
            <label for="phone" class="contact-label">Phone</label>
            <input type="tel" id="phone" name="phone" />
          </div>
    
          <div class="contact-group">
            <label for="message" class="contact-label">Subject <span>(required)</span></label>
            <textarea id="message" name="message" rows="6" required></textarea>
          </div>
    
          <div class="contact-button-row">
            <button type="submit" class="contact-submit">Submit</button>
          </div>
        </form>
      </section>
    </main>

    <!-- Footer  -->
    <footer class="site-footer">
      <div class="wave"></div>
      <div class="footer-inner">
        <div class="footer-left">Hailey DeMark</div>
        <div class="footer-right">
          <div class="footer-email">haileydemark@gmail.com</div>
          <a class="footer-link" href="#">contact me</a>
        </div>
      </div>
    </footer>
  </body>
</html>
