<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Traditional Art - Hailey DeMark</title>
  <link rel="stylesheet" href="/home.css" />
  <link rel="stylesheet" href="/portfolio.css" />
</head>
<body class="simple-page">
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="/">Hailey DeMark</a>
      <nav class="nav">
        <a href="/portfolio" class="nav-link active">Portfolio</a>
        <a href="/about" class="nav-link">About</a>
        <a href="/contact" class="nav-link">Contact</a>
      </nav>
    </div>
  </header>

  <main class="page-content art-page">
    <section class="category-intro">
      <h1 class="portfolio-title">Digital Art</h1>
      <p class="category-description">
        Using applications including Photoshop, Illustrator, and Procreate to create digital artwork.
      </p>
    </section>
  
    <section class="art-gallery" aria-label="Digital art gallery">
      <figure class="art-card">
        <img class="art-image" src="/images/digital/Nikko.png" alt="Nikko digital artwork" />
        <figcaption class="art-caption">Nikko, Procreate (2025)</figcaption>
      </figure>
  
      <figure class="art-card">
        <img class="art-image" src="/images/digital/Ponyo.png" alt="Ponyo digital artwork" />
        <figcaption class="art-caption">Ponyo, Procreate (2025)</figcaption>
      </figure>
  
      <figure class="art-card">
        <img class="art-image" src="/images/digital/JapanChurch.png" alt="Japanese Church digital artwork" />
        <figcaption class="art-caption">Japanese Church, Procreate (2025)</figcaption>
      </figure>
  
      <figure class="art-card">
        <img class="art-image" src="/images/digital/sun.png" alt="Beam digital artwork" />
        <figcaption class="art-caption">Beam, Adobe Illustrator (2025)</figcaption>
      </figure>
  
      <figure class="art-card">
        <img class="art-image" src="/images/digital/WildChild.png" alt="Wild Child digital artwork" />
        <figcaption class="art-caption">Wild Child, Adobe Illustrator (2022)</figcaption>
      </figure>
    </section>
  
    <div class="gallery-nav-row">
      <a href="/portfolio/traditional-art" class="gallery-nav-link gallery-nav-left">
        <span class="gallery-arrow">←</span> Traditional Art
      </a>
  
      <a href="/portfolio/uiux-design" class="gallery-nav-link gallery-nav-right">
        UI/UX Design <span class="gallery-arrow">→</span>
      </a>
    </div>
  </main>

  <footer class="site-footer">
    <div class="wave"></div>
    <div class="footer-inner">
      <div class="footer-left">Hailey DeMark</div>
      <div class="footer-right">
        <div class="footer-email">haileydemark@gmail.com</div>
        <a class="footer-link" href="/contact">contact me</a>
      </div>
    </div>
  </footer>
</body>
</html>
