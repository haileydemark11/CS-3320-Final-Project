<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Traditional Art - Hailey DeMark</title>
  <link rel="stylesheet" href="/home.css" />
  <link rel="stylesheet" href="/portfolio.css" />
</head>
<body class="simple-page">
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="/">Hailey DeMark</a>
      <nav class="nav">
        <a href="/portfolio" class="nav-link active">Portfolio</a>
        <a href="/about" class="nav-link">About</a>
        <a href="/contact" class="nav-link">Contact</a>
      </nav>
    </div>
  </header>

  <main class="page-content">
    <h1 class="portfolio-title">Generative Art</h1>

    <section class="portfolio-grid" aria-label="Traditional art gallery">
      <figure class="portfolio-item">
        <img class="portfolio-img" src="/images/sublime.png" alt="Generative artwork" />
        <figcaption class="portfolio-caption">Generative Art</figcaption>
      </figure>
    </section>
  </main>

  <footer class="site-footer">
    <div class="wave"></div>
    <div class="footer-inner">
      <div class="footer-left">Hailey DeMark</div>
      <div class="footer-right">
        <div class="footer-email">haileydemark@gmail.com</div>
        <a class="footer-link" href="/contact">contact me</a>
      </div>
    </div>
  </footer>
</body>
</html>
