<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio — Hailey DeMark</title>
    <link rel="stylesheet" href="home.css" />
    <link rel="stylesheet" href="portfolio.css" />
  </head>

  <body class="simple-page">
    <!-- Navigation Bar  -->
    <header class="site-header">
      <div class="header-inner">
        <a class="brand" href="/">Hailey DeMark</a>
        
        <nav class="nav">
          <a href="/portfolio" class="nav-link">Portfolio</a>
          <a href="/about" class="nav-link">About</a>
          <a href="/contact" class="nav-link">Contact</a>
        </nav>
        
      </div>
    </header>

    <main class="page-content">
      <h1 class="portfolio-title">My Work</h1>
      
      <!-- attempting the wave divider under the title ... it didn't work 
      <div class="divider-wave" aria-hidden="true"></div> -->

      <section class="portfolio-grid" aria-label="Portfolio categories">
        <figure class="portfolio-item">
          <img class="portfolio-img" src="images/JOY_art.png" alt="Traditional art preview" />
          <figcaption class="portfolio-caption">Traditional Art</figcaption>       <!-- had to look up figcaption to achieve this look  -->
        </figure>

        <figure class="portfolio-item">
          <img class="portfolio-img" src="images/sublime.png" alt="Digital art preview" />
          <figcaption class="portfolio-caption">Digital Art</figcaption>
        </figure>

        <figure class="portfolio-item">
          <img class="portfolio-img" src="images/UIUX.png" alt="UI/UX design preview" />
          <figcaption class="portfolio-caption">UI/UX Design</figcaption>
        </figure>

        <figure class="portfolio-item">
          <img class="portfolio-img" src="images/sun.png" alt="Generative art preview" />
          <figcaption class="portfolio-caption">Generative Art</figcaption>
        </figure>
      </section>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
      <div class="footer-inner">
        <div class="footer-left">Hailey DeMark</div>
        <div class="footer-right">
          <div class="footer-email">haileydemark@gmail.com</div>
          <a class="footer-link" href="#">contact me</a>
        </div>
      </div>
    </footer>
  </body>
</html>
