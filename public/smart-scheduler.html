<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Scheduler - Hailey DeMark</title>
  <link rel="stylesheet" href="/home.css" />
  <link rel="stylesheet" href="/portfolio.css" />
</head>
<body class="simple-page">
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="/">Hailey DeMark</a>
      <nav class="nav">
        <a href="/portfolio" class="nav-link active">Portfolio</a>
        <a href="/about" class="nav-link">About</a>
        <a href="/contact" class="nav-link">Contact</a>
      </nav>
    </div>
  </header>

  <main class="page-content art-page">
    <section class="category-intro">
      <h1 class="portfolio-title">Smart Scheduler</h1>
      <p class="category-description">
        Mobile scheduling app concept designed to help users organize calendars, tasks, and communication in one place.
      </p>
    </section>

    <section class="art-gallery" aria-label="Smart Scheduler case study images">
      <figure class="art-card">
        <img class="art-image" src="/images/uiux/SmartScheduler/SmartScheduler.png" alt="Smart Scheduler overview" />
        <figcaption class="art-caption">Project overview screen</figcaption>
      </figure>

      <figure class="art-card">
        <img class="art-image" src="/images/uiux/SmartScheduler/SShome.png" alt="Smart Scheduler home screen" />
        <figcaption class="art-caption">Home screen</figcaption>
      </figure>

      <figure class="art-card">
        <img class="art-image" src="/images/uiux/SmartScheduler/SScalendar.png" alt="Smart Scheduler calendar screen" />
        <figcaption class="art-caption">Calendar screen</figcaption>
      </figure>

      <figure class="art-card">
        <img class="art-image" src="/images/uiux/SmartScheduler/SStasks.png" alt="Smart Scheduler tasks screen" />
        <figcaption class="art-caption">Tasks screen</figcaption>
      </figure>

      <figure class="art-card">
        <img class="art-image" src="/images/uiux/SmartScheduler/SSmessage.png" alt="Smart Scheduler message screen" />
        <figcaption class="art-caption">Messages screen</figcaption>
      </figure>

      <figure class="art-card">
        <img class="art-image" src="/images/uiux/SmartScheduler/SSprofile.png" alt="Smart Scheduler profile screen" />
        <figcaption class="art-caption">Profile screen</figcaption>
      </figure>
    </section>

    <div class="gallery-nav-row">
      <a href="/portfolio/uiux-design" class="gallery-nav-link gallery-nav-left">
        <span class="gallery-arrow">←</span> UI/UX Design
      </a>

      <a href="/portfolio/uiux-design/democracy-viewer" class="gallery-nav-link gallery-nav-right">
        Democracy Viewer <span class="gallery-arrow">→</span>
      </a>
    </div>
  </main>

  <footer class="site-footer">
    <div class="wave"></div>
    <div class="footer-inner">
      <div class="footer-left">Hailey DeMark</div>
      <div class="footer-right">
        <div class="footer-email">haileydemark@gmail.com</div>
        <a class="footer-link" href="/contact">contact me</a>
      </div>
    </div>
  </footer>
